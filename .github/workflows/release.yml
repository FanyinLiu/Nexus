name: Release Build

# Two trigger modes:
#
#  - Automatic: push a `v*.*.*` tag (`git tag vX.Y.Z && git push origin vX.Y.Z`).
#    Creates a GitHub Release for the tag if one doesn't already exist,
#    then builds + uploads installers for all three platforms in parallel.
#
#  - Manual (`workflow_dispatch` with a `tag` input): lets you continue an
#    existing draft release after a platform build failed. Published releases
#    are immutable in this project; never delete and rebuild one in place.
#
# The release is held in **draft** state while the platform jobs run
# because GitHub marks a published release as immutable — you can't add
# new assets after it's out. The flow:
#
#   ensure-release → creates a draft release, or reuses an existing draft.
#                    If the tag already has a published release, the workflow
#                    fails and asks for a new version tag.
#   preflight     → runs the tag-safe pre-release gate before any platform
#                   installer is built or uploaded.
#   build (×3)    → builds Windows / macOS / Linux installers and
#                   uploads them to the draft. `gh release upload
#                   --clobber` overwrites any name collision, so retries
#                   are safe.
#   publish       → flips the draft to published once every build job
#                   finished successfully. If any of them failed the
#                   release stays as a draft so you can inspect the
#                   partial uploads and fix before going out.
#
# Neither the Windows nor macOS builds are code-signed today — Gatekeeper /
# SmartScreen will warn on first launch. The preflight job prints a
# non-blocking signing readiness report; the hard gates stay out of the default
# release flow until Apple Developer ID and Windows signing prerequisites are
# wired and verified.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.4). Leave blank if triggered by tag push.'
        required: false

permissions:
  contents: write

jobs:
  ensure-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve tag
        id: resolve
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          if [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            tag="$REF_NAME"
          fi
          if [ -z "$tag" ] || [ "$tag" = "main" ]; then
            echo "Tag is empty or looks like a branch name (got '$tag'). Specify the tag via workflow_dispatch input." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.tag }}

      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.resolve.outputs.tag }}
        shell: bash
        run: |
          # GitHub marks a published release as immutable. If this tag already
          # has a published release, stop here instead of deleting it. Reusing
          # a published version breaks update semantics and can strand users
          # on mismatched latest.yml metadata.
          existing_json=$(gh release view "$TAG" --repo "${{ github.repository }}" --json isDraft,name,body 2>/dev/null || echo "")
          if [ -n "$existing_json" ]; then
            is_draft=$(echo "$existing_json" | jq -r '.isDraft')
            if [ "$is_draft" = "true" ]; then
              echo "Draft release $TAG already exists — will append assets to it."
              exit 0
            fi
            echo "::error::Published release $TAG already exists. Do not rebuild or delete published releases; bump to a new tag instead."
            exit 1
          fi

          # SemVer convention: any tag containing '-' (e.g. v1.0.0-beta.1,
          # v1.0.0-rc.2, v1.0.0-alpha.3) is a pre-release. electron-builder
          # picks up on the pre-release identifier and publishes to the
          # `beta.yml` channel instead of `latest.yml`, so stable users
          # aren't auto-upgraded to unstable builds.
          PRERELEASE_FLAG=""
          if [[ "$TAG" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
            echo "Tag '$TAG' looks like a pre-release — marking release as pre-release."
          fi

          notes_file="docs/RELEASE-NOTES-${TAG}.md"
          notes_args=(--notes "## Nexus $TAG")
          if [ -f "$notes_file" ]; then
            echo "Using release notes from $notes_file"
            notes_args=(--notes-file "$notes_file")
          fi

          echo "Creating draft release $TAG"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            "${notes_args[@]}" \
            --target "${{ github.sha }}" \
            --draft \
            $PRERELEASE_FLAG

  preflight:
    needs: ensure-release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.ensure-release.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run SQLite smoke
        run: npm run sqlite:smoke

      - name: Run tag-safe pre-release gate
        run: npm run prerelease-check -- ${{ needs.ensure-release.outputs.tag }} --skip=A --quick

      - name: Report signing readiness
        run: npm run release:signing:readiness

  build:
    needs: [ensure-release, preflight]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            cmd: npx electron-builder --win nsis --publish never --config.win.signAndEditExecutable=false
            assets: |
              release/*.exe
              release/*.exe.blockmap
              release/latest.yml
          # Apple Silicon only. Intel Mac (macos-13) was dropped in v0.2.8 —
          # GitHub deprecated the free-tier `macos-13` runner pool and queue
          # times climbed to many hours, stalling every release. Apple
          # transitioned to arm64 in Nov 2020, so remaining Intel-Mac users
          # are a small and shrinking minority. If we ever need x64 Mac
          # builds again, the safe path is a dedicated Intel runner (self-
          # hosted or paid) — cross-building --x64 from an arm64 host
          # silently bundles the darwin-arm64 sherpa-onnx binary into the
          # x64 .dmg because npm 10+ skips platform-mismatched optional
          # dependencies.
          - os: macos-latest
            cmd: npx electron-builder --mac dmg zip --arm64 --publish never
            assets: |
              release/*.dmg
              release/*.dmg.blockmap
              release/*.zip
              release/*.zip.blockmap
              release/latest-mac.yml
          - os: ubuntu-latest
            cmd: npx electron-builder --linux AppImage deb tar.gz --publish never
            assets: |
              release/*.AppImage
              release/*.deb
              release/*.tar.gz
              release/SHA256SUMS
              release/*.asc
              release/latest-linux*.yml

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.ensure-release.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run SQLite smoke
        run: npm run sqlite:smoke

      - run: npm run build
        name: Vite build

      - name: Cache sherpa models
        uses: actions/cache@v4
        with:
          path: |
            sherpa-models
            public/vendor/vad
          key: sherpa-models-skip-asr-${{ hashFiles('electron/services/modelDefinitions.js') }}

      - name: Cache electron-builder
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: electron-builder-${{ matrix.os }}-${{ hashFiles('package-lock.json') }}

      - name: Download sherpa models
        run: node scripts/download-models.mjs --skip-asr

      - name: Package installer
        env:
          # Disable Apple codesign when no cert is configured so the build
          # still produces a working (unnotarised) .app / .dmg.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ matrix.os == 'macos-latest' && 'false' || '' }}
        run: ${{ matrix.cmd }}

      - name: List built artifacts
        shell: bash
        run: ls -lh release/ || true

      - name: Generate SHA256SUMS (Linux only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cd release
          # Hash every Linux artifact in one canonical file. Users can
          # then run `sha256sum -c SHA256SUMS` after downloading.
          sha256sum *.AppImage *.deb *.tar.gz > SHA256SUMS
          echo "::group::SHA256SUMS contents"
          cat SHA256SUMS
          echo "::endgroup::"

      - name: GPG-sign Linux artifacts (if key configured)
        if: matrix.os == 'ubuntu-latest'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        shell: bash
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::warning::GPG_PRIVATE_KEY secret not set — Linux artifacts will ship without GPG signatures (SHA256SUMS still produced)."
            echo "To enable detached signing:"
            echo "  1. Generate a key: gpg --full-generate-key (RSA 4096, no expiry, name=Nexus Releases)"
            echo "  2. Export private: gpg --export-secret-keys --armor <KEY_ID> > key.asc"
            echo "  3. Add repo secrets: GPG_PRIVATE_KEY = file contents; GPG_PASSPHRASE = passphrase"
            echo "  4. Publish public key alongside the README so users can import + verify."
            exit 0
          fi
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --keyid-format=long --with-colons | awk -F: '/^sec:/ { print $5; exit }')
          if [ -z "$KEY_ID" ]; then
            echo "::error::Failed to extract key ID from imported GPG key"
            exit 1
          fi
          echo "Signing with key $KEY_ID"
          cd release
          for f in *.AppImage *.deb *.tar.gz SHA256SUMS; do
            [ -f "$f" ] || continue
            echo "Signing $f"
            echo "$GPG_PASSPHRASE" | gpg --batch --pinentry-mode loopback \
              --passphrase-fd 0 --local-user "$KEY_ID" \
              --detach-sign --armor "$f"
          done
          echo "::group::Signature files produced"
          ls -la *.asc
          echo "::endgroup::"

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.ensure-release.outputs.tag }}
        shell: bash
        run: |
          shopt -s nullglob
          files=()
          while IFS= read -r line; do
            # Expand each glob line against the workspace
            for f in $line; do
              [ -f "$f" ] && files+=("$f")
            done
          done <<< '${{ matrix.assets }}'

          if [ ${#files[@]} -eq 0 ]; then
            echo "No matching artifacts found for ${{ matrix.os }} — failing so the missing platform is visible." >&2
            exit 1
          fi

          for f in "${files[@]}"; do
            echo "Uploading $f"
            gh release upload "$TAG" "$f" --clobber --repo "${{ github.repository }}"
          done

  publish:
    needs: [ensure-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.ensure-release.outputs.tag }}
        shell: bash
        run: |
          echo "Publishing draft release $TAG"
          gh release edit "$TAG" --repo "${{ github.repository }}" --draft=false
