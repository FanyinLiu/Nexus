name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      # Keep the remaining matrix legs running even if one platform regresses
      # so we surface all three OS failures at once.
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx tsc -b --force
        name: Type check

      - run: npm run lint
        name: Lint

      - run: npm run build
        name: Vite build

      - run: npm test
        name: Run tests

      - name: Install Linux packaged smoke dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils libatspi2.0-0 libdrm2 libgbm1

      - run: npm run package:dir:smoke
        name: Packaged smoke
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
